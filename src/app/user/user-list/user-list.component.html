<div class="min-height-300 bg-dark position-absolute w-100"></div>

<aside
  id="sidenav-main"
  class="max-w-62.5 ease-nav-brand z-990 fixed inset-y-0 my-4 ml-4 block w-full -translate-x-full flex-wrap items-center justify-between overflow-y-auto rounded-2xl border-0 bg-white p-0 antialiased shadow-none transition-transform duration-200 xl:left-0 xl:translate-x-0 xl:bg-transparent">
  <app-side-bar></app-side-bar>
</aside>

<main class="ease-soft-in-out xl:ml-68.5 relative h-full max-h-screen rounded-xl transition-all duration-200">
  <!-- Navbar -->
  <app-nav-layout></app-nav-layout>
  <!-- End Navbar -->

  <div class="container-fluid py-4">
    <div class="container py-4">
<!-- Hero -->
<div class="hero-rectangle mb-4">
<div class="hero-rectangle mb-4" style="height:35px; overflow:hidden;">
  <img
    src="assets/img/curved-images/curved0.jpg"
    alt="Illustration"
    style="width:100%; height:100% !important; object-fit:cover; display:block;"
  />
</div>

</div>

      <!-- Header -->
<div class="d-flex justify-content-between align-items-center mb-4">
  <h3 class="mb-4 fw-bold border-bottom pb-2"
          style="background:linear-gradient(90deg,#344767);
                 -webkit-background-clip:text;background-clip:text;color:transparent;">👤 Liste des Utilisateurs</h3>
        <div class="d-flex gap-2">
          <a routerLink="/users/create" class="btn btn-success -pill shadow-sm px-3">
            ➕ Ajouter un utilisateur
          </a>
        </div>
      </div>

      <!-- Empty state -->
      <div *ngIf="!paginatedUsers || paginatedUsers.length === 0" class="alert alert-info text-center rounded-3 shadow-sm">
        Aucun utilisateur trouvé.
      </div>

      <!-- Table -->
      <div *ngIf="paginatedUsers && paginatedUsers.length > 0" class="card shadow-sm border-0 rounded-4">
        <div class="card-body p-4">
          <div class="">
            <table class="table table-hover align-middle text-center">
              <thead class="table-primary">
                <tr>
                  <th class="ps-4">ID</th>
                  <th>Nom</th>
                  <th>Email</th>
                  <th>Rôle</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody>
                <tr *ngFor="let user of paginatedUsers">
                <td class="ps-4"><p class="text-sm fw-normal mb-0">{{ user.id }}</p></td>
                <td><p class="text-sm fw-normal mb-0">{{ user.name }}</p></td>
                <td><p class="text-sm fw-normal mb-0">{{ user.email }}</p></td>
                <td><p class="text-sm fw-normal mb-0">{{ user.role }}</p></td>

                  <td>
                    <div class="d-inline-flex gap-2">
                      <button type="button" class="btn btn-sm btn-outline-primary -pill px-3 shadow-sm" [routerLink]="['/users', user.id]">
                        ✏️ Modifier
                      </button>
                      <button type="button" class="btn btn-sm btn-outline-danger -pill px-3 shadow-sm" (click)="delete(user.id)">
                        🗑️ Supprimer
                      </button>
                    </div>
                  </td>
                </tr>
              </tbody>
            </table>
          </div>

          <!-- Pagination -->
          <nav class="mt-3 d-flex justify-content-center">
            <ul class="pagination">
              <li class="page-item" [class.disabled]="currentPage === 1">
                <a class="page-link" (click)="changePage(currentPage - 1)">Préc.</a>
              </li>
              <li class="page-item" *ngFor="let page of totalPages" [class.active]="page === currentPage">
                <a class="page-link" (click)="changePage(page)">{{ page }}</a>
              </li>
              <li class="page-item" [class.disabled]="currentPage === totalPages.length">
                <a class="page-link" (click)="changePage(currentPage + 1)">Suiv.</a>
              </li>
            </ul>
          </nav>
          <!-- End Pagination -->

        </div>
      </div>

    </div>

    <app-footer></app-footer>
  </div>
</main>
