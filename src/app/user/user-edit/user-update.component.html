<div class="min-height-300 bg-dark position-absolute w-100"></div>

<aside class="max-w-62.5 ease-nav-brand z-990 fixed inset-y-0 my-4 ml-4 block w-full 
-translate-x-full flex-wrap items-center justify-between overflow-y-auto rounded-2xl 
border-0 bg-white p-0 antialiased shadow-none transition-transform duration-200 
xl:left-0 xl:translate-x-0 xl:bg-transparent" id="sidenav-main">
  <app-side-bar></app-side-bar>
</aside>

<main class="ease-soft-in-out xl:ml-68.5 relative h-full max-h-screen rounded-xl transition-all duration-200">
  <app-nav-layout></app-nav-layout>

  <div class="container">
    <div class="row justify-content-center">
      <div class="col-lg-7 col-md-9">
        <div class="card shadow-lg border-0 rounded-4 my-4">
          <!-- Header -->
          <div class="card-header bg-primary text-white rounded-top-4">
            <h5 class="mb-0"><i class="fas fa-user-edit me-2"></i>Modifier l'utilisateur</h5>
          </div>

          <!-- Body -->
          <div class="card-body p-4">
            <form [formGroup]="userForm" (ngSubmit)="onSubmit()">
              <!-- Nom -->
              <div class="mb-3">
                <label class="form-label fw-semibold text-secondary">Nom</label>
                <input type="text" class="form-control rounded-pill" formControlName="name" placeholder="Saisir le nom">
              </div>

              <!-- Email -->
              <div class="mb-3">
                <label class="form-label fw-semibold text-secondary">Email</label>
                <input type="email" class="form-control rounded-pill" formControlName="email" placeholder="exemple@mail.com">
              </div>

              <!-- Mot de passe -->
              <div class="mb-3">
                <label class="form-label fw-semibold text-secondary">Mot de passe</label>
                <input type="password" class="form-control rounded-pill" formControlName="password" placeholder="Laisser vide pour ne pas changer">
              </div>

              <!-- Rôle -->
              <div class="mb-4">
                <label class="form-label fw-semibold text-secondary">Rôle</label>
                <select class="form-select rounded-pill" formControlName="role">
                  <option value="admin">Admin</option>
                  <option value="manager">Manager</option>
                  <option value="rh">RH</option>
                </select>
              </div>

              <!-- Boutons -->
              <div class="d-flex justify-content-between">
                <button class="btn btn-light btn-lg rounded-pill shadow-sm px-4" type="button" routerLink="/users">
                  ❌ Annuler
                </button>
                  <button type="submit" class="btn btn-lg rounded-pill shadow-sm text-white" 
        style="background: linear-gradient(310deg,#17ad37,#84dc14); border:0;">
  ✅ Enregistrer
</button>
              </div>
            </form>
          </div>
        </div>
      </div>
    </div>

    <app-footer></app-footer>
  </div>
</main>
