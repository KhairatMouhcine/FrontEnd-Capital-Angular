<div class="min-height-300 bg-dark position-absolute w-100"></div>

<aside class="max-w-62.5 ease-nav-brand z-990 fixed inset-y-0 my-4 ml-4 block w-full 
  -translate-x-full flex-wrap items-center justify-between overflow-y-auto rounded-2xl 
  border-0 bg-white p-0 antialiased shadow-lg transition-transform duration-200 
  xl:left-0 xl:translate-x-0 xl:bg-transparent" id="sidenav-main">
  <app-side-bar></app-side-bar>
</aside>

<main class="ease-soft-in-out xl:ml-68.5 relative h-full max-h-screen rounded-xl transition-all duration-200">
  <app-nav-layout></app-nav-layout>

  <div class="container-fluid py-4">
    <div class="container py-4">
      <div class="hero-rectangle mb-4" style="height:35px; overflow:hidden;">
  <img
    src="assets/img/curved-images/curved0.jpg"
    alt="Illustration"
    style="width:100%; height:100% !important; object-fit:cover; display:block;"
  />
</div>
      <h3 class="mb-4 fw-bold border-bottom pb-2"
          style="background:linear-gradient(90deg,#344767);
                 -webkit-background-clip:text;background-clip:text;color:transparent;">👤 Mon compte</h3>

      <div *ngIf="loading" class="alert alert-info">Chargement…</div>
      <div *ngIf="error" class="alert alert-danger">{{ error }}</div>

      <div *ngIf="user" class="card shadow-sm">
        <div class="card-body">
          <dl class="row mb-0">
            

            <dt class="col-sm-3">Nom</dt>
            <dd class="col-sm-9">{{ user.name }}</dd>

            <dt class="col-sm-3">Email</dt>
            <dd class="col-sm-9">{{ user.email }}</dd>

            <dt class="col-sm-3">Rôle</dt>
            <dd class="col-sm-9"><span class="badge bg-secondary">{{ user.role }}</span></dd>
          </dl>
        </div>
      </div>

      <div class="text-end mt-3">
        <button class="btn btn-outline-primary" (click)="load()">↻ Actualiser</button>
      </div>
    </div>

    <app-footer></app-footer>
  </div>
</main>
