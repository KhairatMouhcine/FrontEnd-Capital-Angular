<div class="min-height-300 bg-dark position-absolute w-100"></div>

<!-- Sidebar -->
<aside
  id="sidenav-main"
  class="max-w-62.5 ease-nav-brand z-990 fixed inset-y-0 my-4 ml-4 block w-full 
         -translate-x-full flex-wrap items-center justify-between overflow-y-auto 
         rounded-2xl border-0 bg-white p-0 antialiased shadow-none transition-transform 
         duration-200 xl:left-0 xl:translate-x-0 xl:bg-transparent">
  <app-side-bar></app-side-bar>
</aside>

<!-- Main -->
<main
  class="ease-soft-in-out xl:ml-68.5 relative h-full max-h-screen rounded-xl transition-all duration-200">
  
  <app-nav-layout></app-nav-layout>

  <!-- Upload KBIS -->
  <div class="mb-4 p-3">
    <input
      type="file"
      hidden
      #fileInput
      accept=".pdf,.png,.jpg,.jpeg,.webp"
      (change)="onFileChange($event)" />

    <!-- Bouton import -->
    <div class="d-flex justify-content-end">
      <button type="button" class="btn btn-outline-primary rounded-pill px-4 shadow-sm"
              (click)="fileInput.click()">
        📄 Importer un KBIS
      </button>
    </div>

    <!-- Spinner -->
    <div *ngIf="isLoading" class="d-flex align-items-center mt-3">
      <div class="spinner-border text-primary me-2" role="status" style="width: 1.5rem; height: 1.5rem;">
        <span class="visually-hidden">Chargement...</span>
      </div>
      <span>Analyse du KBIS en cours...</span>
    </div>

    <!-- Messages -->
    <div *ngIf="uploadMessage" class="mt-3">
      <span [ngClass]="{
          'text-success': uploadMessage.startsWith('✅'),
          'text-danger': uploadMessage.startsWith('❌')
        }">
        {{ uploadMessage }}
      </span>
    </div>
  </div>

  <!-- Formulaire Client -->
  <div class="container-fluid py-4">
    <form [formGroup]="form" (ngSubmit)="onSubmit()"
          class="container mt-4 p-4 rounded shadow bg-white">
      
      <h3 class="mb-4 fw-bold border-bottom pb-2"
          style="background:linear-gradient(90deg,#344767);
                 -webkit-background-clip:text;background-clip:text;color:transparent;">
        {{ isEditMode ? '✏️ Modifier le client' : '✏️ Créer un client' }}
      </h3>

      <!-- Ligne 1 -->
      <div class="row mb-3">
        <div class="col-6">
          <label for="denomination" class="form-label">Dénomination</label>
          <input id="denomination" formControlName="denomination" class="form-control" type="text" />
        </div>
        <div class="col-6">
          <label for="siren" class="form-label">SIRET</label>
          <input id="siren" formControlName="siren" class="form-control" type="text" />
        </div>
      </div>

      <!-- Ligne 2 -->
      <div class="row mb-3">
        <div class="col-6">
          <label for="adresse" class="form-label">Adresse</label>
          <input id="adresse" formControlName="adresse" class="form-control" type="text" />
        </div>
        <div class="col-6">
          <label for="formeJuridique" class="form-label">Forme Juridique</label>
          <input id="formeJuridique" formControlName="formeJuridique" class="form-control" type="text" />
        </div>
      </div>

      <!-- Ligne 3 -->
      <div class="row mb-3">
        <div class="col-6">
          <label for="dateImmatriculation" class="form-label">Date Immatriculation</label>
          <input id="dateImmatriculation" formControlName="dateImmatriculation" class="form-control" type="date" />
        </div>
        <div class="col-6">
          <label for="capitalSocial" class="form-label">Capital Social</label>
          <input id="capitalSocial" formControlName="capitalSocial" class="form-control" type="text" />
        </div>
      </div>

      <!-- Ligne 4 -->
      <div class="row mb-3">
        <div class="col-6">
          <label for="dateCommencement" class="form-label">Date Commencement</label>
          <input id="dateCommencement" formControlName="dateCommencement" class="form-control" type="date" />
        </div>
      </div>

      <!-- Activités -->
      <div class="mb-3">
        <label class="form-label fw-bold">Activités</label>
        <div formArrayName="activites">
          <div *ngFor="let ctrl of activites.controls; let i = index"
               class="input-group mb-2 shadow-sm rounded-pill bg-light overflow-hidden">
            <input [formControlName]="i" type="text"
                   class="form-control border-0 bg-light px-4 py-2 rounded-start-pill"
                   placeholder="Activité..." />
            <button type="button"
                    class="btn btn-light text-danger px-3 rounded-end-pill"
                    (click)="removeActivite(i)">
              <i class="bi bi-x-lg"></i>
            </button>
          </div>
        </div>
        <button type="button" class="btn btn-outline-primary btn-sm mt-2 -pill"
                (click)="addActivite()">
          + Ajouter une activité
        </button>
      </div>

      <!-- Dirigeant -->
      <fieldset formGroupName="dirigeant" class="border p-3 rounded mb-3">
        <legend class="float-none w-auto px-2">Dirigeant</legend>
        <div class="row mb-3">
          <div class="col-6">
            <label for="nom" class="form-label">Nom</label>
            <input id="nom" class="form-control" formControlName="nom" type="text" />
          </div>
          <div class="col-6">
            <label for="prenom" class="form-label">Prénom</label>
            <input id="prenom" class="form-control" formControlName="prenom" type="text" />
          </div>
        </div>
        <div class="row mb-3">
          <div class="col-6">
            <label for="dateNaissance" class="form-label">Date de naissance</label>
            <input id="dateNaissance" class="form-control" formControlName="dateNaissance" type="date" />
          </div>
          <div class="col-6">
            <label for="lieuNaissance" class="form-label">Lieu de naissance</label>
            <input id="lieuNaissance" class="form-control" formControlName="lieuNaissance" type="text" />
          </div>
        </div>
        <div class="mb-3">
          <label for="adresseDirigeant" class="form-label">Adresse</label>
          <input id="adresseDirigeant" class="form-control" formControlName="adresse" type="text" />
        </div>
      </fieldset>

<div class="d-grid">
  <button type="submit"
          class="btn -pill px-4 shadow-sm"
          style="background-color:#198754; color:#fff;">
    {{ isEditMode ? 'Mettre à jour' : 'Créer le client' }}
  </button>
</div>

    </form>

    <app-footer></app-footer>
  </div>
</main>
