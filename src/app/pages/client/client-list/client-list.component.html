<div class="min-height-300 bg-dark position-absolute w-100"></div>

<!-- 🔹 Sidebar -->
<aside
  id="sidenav-main"
  class="max-w-62.5 ease-nav-brand z-990 fixed inset-y-0 my-4 ml-4 block w-full -translate-x-full flex-wrap items-center justify-between overflow-y-auto rounded-2xl border-0 bg-white p-0 antialiased shadow-lg transition-transform duration-200 xl:left-0 xl:translate-x-0 xl:bg-transparent">
  <app-side-bar></app-side-bar>
</aside>

<!-- 🔹 Main -->
<main class="ease-soft-in-out xl:ml-68.5 relative h-full max-h-screen rounded-xl transition-all duration-200">
  <!-- 🔹 Navbar -->
  <app-nav-layout></app-nav-layout>

  <div class="container-fluid py-4">
    <div class="page-container bg-white rounded-4 shadow-sm p-4">
      <!-- 🔹 Hero (une seule fois) -->
      <div class="hero-rectangle mb-4" style="height:35px; overflow:hidden;">
        <img
          src="assets/img/curved-images/curved0.jpg"
          alt="Illustration"
          style="width:100%; height:100% !important; object-fit:cover; display:block;"
        />
      </div>
      <!-- 🔹 Titre + bouton Ajouter -->
<div class="d-flex justify-content-between align-items-center mb-4">
               <h3 class="mb-4 fw-bold border-bottom pb-2"
          style="background:linear-gradient(90deg,#344767);
                 -webkit-background-clip:text;background-clip:text;color:transparent;">👤 Liste des Clients</h3>
        <button class="btn btn-success -pill shadow-sm px-3" (click)="addClient()">
          ➕ Ajouter un client
        </button>
      </div>



      <!-- 🔍 Barre de recherche -->
      <div class="mb-4">
        <input
          [formControl]="searchControl"
          class="form-control -pill px-4 shadow-sm"
          placeholder="🔎 Rechercher un client..."
        />
      </div>

      <!-- 🧾 Tableau des clients -->
      <!-- Remarque: j'ai retiré .table-responsive pour éviter le scroll interne -->
      <table class="table table-hover align-middle text-center shadow-sm rounded-3 overflow-hidden">
        <thead class="bg-gradient-primary text-white">
          <tr>
            <th>#</th>
            <th>Nom</th>
            <th>Dirigeant</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let c of pagedClients; let i = index" class="align-middle">
            <td class="fw-semibold">{{ (currentPage - 1) * pageSize + i + 1 }}</td>
            <td>{{ c.donneesJson?.Denomination }}</td>
            <td>{{ c.donneesJson?.Dirigeant?.Nom || '-' }}</td>
            <td>
              <div class="d-flex justify-content-center gap-2">
                <button
                  class="btn btn-sm btn-outline-primary -pill px-3 shadow-sm"
                  (click)="editClient(c.id!)">
                  ✏️ Modifier
                </button>
                <button
                  class="btn btn-sm btn-outline-danger -pill px-3 shadow-sm"
                  (click)="deleteClient(c.id!)">
                  🗑️ Supprimer
                </button>
              </div>
            </td>
          </tr>
        </tbody>
      </table>

      <!-- ⏩ Pagination -->
      <div class="d-flex justify-content-between align-items-center mt-4">
        <button
          class="btn btn-sm btn-outline-secondary -pill shadow-sm px-3"
          (click)="prevPage()"
          [disabled]="currentPage === 1">
          ⬅️ Précédent
        </button>

        <span class="fw-semibold">Page {{ currentPage }} / {{ totalPages }}</span>

        <button
          class="btn btn-sm btn-outline-secondary -pill shadow-sm px-3"
          (click)="nextPage()"
          [disabled]="currentPage === totalPages">
          Suivant ➡️
        </button>
      </div>

    </div>

    <!-- Footer -->
    <app-footer></app-footer>
  </div>
</main>
