<div class="min-height-300 bg-dark position-absolute w-100"></div>

<!-- 🔹 Sidebar -->
<aside
  class="max-w-62.5 ease-nav-brand z-990 fixed inset-y-0 my-4 ml-4 block w-full -translate-x-full
         flex-wrap items-center justify-between overflow-y-auto rounded-2xl border-0 bg-white p-0
         antialiased shadow-none transition-transform duration-200 xl:left-0 xl:translate-x-0 xl:bg-transparent">
  <app-side-bar></app-side-bar>
</aside>

<!-- 🔹 Main -->
<main class="ease-soft-in-out xl:ml-68.5 relative h-full max-h-screen rounded-xl transition-all duration-200">
  <!-- Navbar -->
  <app-nav-layout></app-nav-layout>

  <div class="container-fluid py-4">
    <div class="page-container bg-white rounded-4 shadow-sm p-4">
      <!-- 🔹 Hero (une seule fois) -->
      <div class="hero-rectangle mb-4" style="height:35px; overflow:hidden;">
        <img
          src="assets/img/curved-images/curved0.jpg"
          alt="Illustration"
          style="width:100%; height:100% !important; object-fit:cover; display:block;"
        />
      </div>
      <!-- 🔹 Titre + bouton Ajouter -->
<div class="d-flex justify-content-between align-items-center mb-4">
  <h3 class="mb-4 fw-bold border-bottom pb-2"
          style="background:linear-gradient(90deg,#344767);
                 -webkit-background-clip:text;background-clip:text;color:transparent;">👤 Liste des Fournisseurs</h3>
        <button class="btn btn-success -pill shadow-sm px-3" (click)="addFournisseur()">
          ➕ Ajouter un fournisseur
        </button>
      </div>

      <!-- 🔍 Barre de recherche -->
      <div class="mb-4">
        <input
          type="text"
          class="form-control -pill px-4 shadow-sm"
          [formControl]="searchControl"
          placeholder="🔎 Rechercher un fournisseur..." />
      </div>

      <!-- 🧾 Tableau des fournisseurs (sans scroll interne) -->
      <table class="table table-hover align-middle text-center shadow-sm rounded-3 overflow-hidden mb-0">
        <thead class="bg-primary text-white">
          <tr>
            <th class="py-3">#</th>
            <th class="py-3">Dénomination</th>
            <th class="py-3">Dirigeant</th>
            <th class="py-3" style="width:300px;">Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let f of pagedFournisseurs; let i = index" class="bg-white">
            <td class="fw-semibold">{{ (currentPage - 1) * pageSize + i + 1 }}</td>
            <td>{{ f.donneesJson?.Denomination }}</td>
            <td>{{ f.donneesJson?.Dirigeant?.Nom || '-' }}</td>
            <td>
              <div class="d-flex justify-content-center gap-2">
                <button
                  class="btn btn-sm btn-outline-primary -pill px-3 shadow-sm"
                  (click)="editFournisseur(f.id!)">
                  ✏️ Modifier
                </button>
                <button
                  class="btn btn-sm btn-outline-danger -pill px-3 shadow-sm"
                  (click)="deleteFournisseur(f.id!)">
                  🗑️ Supprimer
                </button>
              </div>
            </td>
          </tr>

          <!-- État vide (optionnel) -->
          <!--
          <tr *ngIf="pagedFournisseurs?.length === 0">
            <td colspan="4" class="text-muted py-4">Aucun fournisseur trouvé.</td>
          </tr>
          -->
        </tbody>
      </table>

      <!-- ⏩ Pagination -->
      <div class="d-flex justify-content-between align-items-center mt-4">
        <button
          class="btn btn-sm btn-outline-secondary -pill shadow-sm px-3"
          (click)="prevPage()"
          [disabled]="currentPage === 1">
          ⬅️ Précédent
        </button>

        <span class="fw-semibold">Page {{ currentPage }} / {{ totalPages }}</span>

        <button
          class="btn btn-sm btn-outline-secondary -pill shadow-sm px-3"
          (click)="nextPage()"
          [disabled]="currentPage === totalPages">
          Suivant ➡️
        </button>
      </div>

    </div>

    <app-footer class="mt-4"></app-footer>
  </div>
</main>
