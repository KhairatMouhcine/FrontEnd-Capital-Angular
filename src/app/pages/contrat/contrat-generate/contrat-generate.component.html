<div class="min-height-300 bg-dark position-absolute w-100"></div>

<aside
  id="sidenav-main"
  class="max-w-62.5 ease-nav-brand z-990 fixed inset-y-0 my-4 ml-4 block w-full -translate-x-full
         flex-wrap items-center justify-between overflow-y-auto rounded-2xl border-0 bg-white p-0
         antialiased shadow-none transition-transform duration-200 xl:left-0 xl:translate-x-0 xl:bg-transparent">
  <app-side-bar></app-side-bar>
</aside>

<main class="ease-soft-in-out xl:ml-68.5 relative h-full max-h-screen rounded-xl transition-all duration-200">
  <!-- Navbar -->
  <app-nav-layout></app-nav-layout>
  <!-- End Navbar -->

  <div class="container-fluid py-4">
    <div class="container py-4 bg-white rounded-4 shadow-sm p-4">



      <!-- 🔹 Hero (bannière fine) -->
      <div class="mb-4 -4 overflow-hidden" style="height:35px;">
        <img
          src="assets/img/curved-images/curved0.jpg"
          alt="Illustration"
          style="width:100%; height:100% !important; object-fit:cover; display:block;">
      </div>
      <!-- 🔹 Header -->
      <div class="d-flex justify-content-between align-items-center mb-4 border-bottom pb-3">
             <h3 class="mb-4 fw-bold border-bottom pb-2"
          style="background:linear-gradient(90deg,#344767);
                 -webkit-background-clip:text;background-clip:text;color:transparent;">🧾 Générer les contrats</h3>
        <!-- (CTA optionnel, laissé vide pour ne rien changer côté TS) -->
      </div>
      <!-- 🔹 Étape 1 -->
      <section class="card border-0 shadow-sm rounded-4 mb-4">
        <div class="card-header bg-white border-0 d-flex align-items-center justify-content-between">
        </div>

        <div class="card-body pt-0">
          <div *ngIf="loading()" class="text-muted">Chargement…</div>
          <div *ngIf="!loading() && emplois().length === 0" class="text-muted">Aucune affectation en cours</div>

          <!-- Table sans scroll interne -->
          <table *ngIf="!loading() && emplois().length"
                 class="table table-hover align-middle mb-0">
            <thead class="bg-primary text-white">
              <tr class="text-center">
                <th  style="width:350px;">Client</th>
                <th>Profil</th>
                <th style="width:250px;">Choix</th>

              </tr>
            </thead>
            <tbody>
              <tr *ngFor="let e of emplois()" class="text-center">
              
                <!-- Client -->
                <td>{{ e.clientNom || e.denomination }}</td>

                <!-- Profil -->
                <td>{{ e.profilNom || '—' }}</td>
                  <!-- radio de sélection -->
                <td>
                  <input
                    type="radio"
                    class="form-check-input"
                    name="emploi"
                    [value]="e.id"
                    [checked]="selectedEmploiId() === e.id"
                    (change)="onSelectEmploi(e.id)">
                </td>

              </tr>
            </tbody>
          </table>
        </div>
      </section>

      <!-- 🔹 Étape 2 -->
      <section class="card border-0 shadow-sm -4">
        <div class="card-header bg-white border-0">
        </div>

        <div class="card-body pt-0">
          <form [formGroup]="form" class="form" (ngSubmit)="generate()">
            <div class="mb-3">
              <label class="form-label fw-semibold">Objet</label>
              <input formControlName="objet" class="form-control -pill px-3 shadow-sm"
                     placeholder="Mission de développement">
            </div>

            <div class="mb-3">
              <label class="form-label fw-semibold">Lieu d’exécution</label>
              <input formControlName="lieuExecution" class="form-control -pill px-3 shadow-sm"
                     placeholder="Paris">
            </div>

            <div class="d-grid">
              <button type="submit"
                      class="btn btn-outline-success pill shadow-sm"
                      [disabled]="!canGenerateNow() || generating()">
                Générer le(s) contrats
              </button>
            </div>
          </form>
        </div>
      </section>

    </div>

    <app-footer class="app-footer-flat mt-4"></app-footer>
  </div>
</main>
