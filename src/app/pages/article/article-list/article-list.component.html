<div class="min-height-300 bg-dark position-absolute w-100"></div>

<!-- 🔹 Sidebar -->
<aside
  class="max-w-62.5 ease-nav-brand z-990 fixed inset-y-0 my-4 ml-4 block w-full -translate-x-full flex-wrap items-center justify-between overflow-y-auto rounded-2xl border-0 bg-white p-0 antialiased shadow-none transition-transform duration-200 xl:left-0 xl:translate-x-0 xl:bg-transparent">
  <app-side-bar></app-side-bar>
</aside>

<!-- 🔹 Main -->
<main class="ease-soft-in-out xl:ml-68.5 relative h-full max-h-screen rounded-xl transition-all duration-200">
  <!-- Navbar -->
  <app-nav-layout></app-nav-layout>

  <div class="container-fluid py-4">
    <div class="container py-4">
      <!-- 🔹 Hero (bannière fine) -->
      <div class="hero-rectangle mb-4" style="height:35px; overflow:hidden;">
        <img
          src="assets/img/curved-images/curved0.jpg"
          alt="Illustration"
          style="width:100%; height:100% !important; object-fit:cover; display:block;"
        />
      </div>

<div class="d-flex justify-content-between align-items-center mb-4">
               <h3 class="mb-4 fw-bold border-bottom pb-2"
          style="background:linear-gradient(90deg,#344767);
                 -webkit-background-clip:text;background-clip:text;color:transparent;">👤 Liste des Articles</h3>
        <a class="btn btn-success -pill shadow-sm px-3" [routerLink]="['/article-add']">
          +&nbsp; Nouvel article
        </a>
      </div>



      <!-- 🔍 Recherche -->
      <div class="mb-4 d-flex gap-2">
        <input
          type="text"
          class="form-control -pill px-4 shadow-sm"
          placeholder="🔎 Rechercher…"
          [ngModel]="q()"
          (ngModelChange)="q.set($event)"
        />
      </div>

      <!-- ⏳ État chargement -->
      <div *ngIf="loading()" class="text-muted mb-3">Chargement…</div>

      <!-- 🧾 Tableau (sans scroll interne) -->
      <table *ngIf="!loading()" class="table table-hover align-middle text-center shadow-sm rounded-3 overflow-hidden mb-0">
        <thead class="bg-primary text-white">
          <tr>
            <th class="py-3">#</th>
            <th class="py-3">Titre</th>
            <th class="py-3">Type</th>
            <th class="py-3">Ordre</th>
            <th class="py-3" style="width: 300px;">Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let a of filtered()">
            <td class="fw-semibold">{{ a.id }}</td>
            <td>{{ a.titre }}</td>
            <td>{{ a.type }}</td>
            <td>{{ a.ordre ?? '-' }}</td>
            <td>
              <div class="d-flex justify-content-center gap-2">
                <a class="btn btn-sm btn-outline-primary -pill px-3 shadow-sm" [routerLink]="['/article-edit', a.id]">
                  ✏️ Éditer
                </a>
                <button class="btn btn-sm btn-outline-danger -pill px-3 shadow-sm" (click)="remove(a.id)">
                  🗑️ Supprimer
                </button>
              </div>
            </td>
          </tr>

          <!-- État vide -->
          <tr *ngIf="!filtered()?.length">
            <td colspan="5" class="text-muted py-4">Aucun article trouvé.</td>
          </tr>
        </tbody>
      </table>

    </div>

    <app-footer></app-footer>
  </div>
</main>
