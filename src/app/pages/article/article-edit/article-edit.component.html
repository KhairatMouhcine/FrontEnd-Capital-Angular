<!-- Fond sombre haut de page (même que ton autre écran) -->
<div class="min-height-300 bg-dark position-absolute w-100"></div>

<!-- Sidebar -->
<aside
  id="sidenav-main"
  class="max-w-62.5 ease-nav-brand z-990 fixed inset-y-0 my-4 ml-4 block w-full
         -translate-x-full flex-wrap items-center justify-between overflow-y-auto rounded-2xl
         border-0 bg-white p-0 antialiased shadow-lg transition-transform duration-200
         xl:left-0 xl:translate-x-0 xl:bg-transparent">
  <app-side-bar></app-side-bar>
</aside>

<!-- Main + Navbar -->
<main class="ease-soft-in-out xl:ml-68.5 relative h-full max-h-screen rounded-xl transition-all duration-200">
  <!-- Navbar -->
  <app-nav-layout></app-nav-layout>
  <!-- End Navbar -->

  <div class="container-fluid py-4">
    <div class="container py-4">
      <!-- Titre stylé -->
             <h3 class="mb-4 fw-bold border-bottom pb-2"
          style="background:linear-gradient(90deg,#344767);
                 -webkit-background-clip:text;background-clip:text;color:transparent;">
        {{ id ? '✏️ Éditer un article' : '✏️ Nouvel article' }}
      </h3>

      <!-- Carte formulaire -->
      <form [formGroup]="form" (ngSubmit)="save()"
            class="p-4 rounded-3 bg-white shadow-lg border border-light">

        <!-- Ligne 1 : Titre + Type -->
        <div class="row g-3 mb-3">
          <div class="col-md-8">
            <label class="form-label fw-semibold">Titre</label>
            <input class="form-control form-control-lg"
                   type="text"
                   placeholder="Titre de l’article"
                   formControlName="titre" />
          </div>
          <div class="col-md-4">
            <label class="form-label fw-semibold">Type</label>
            <select class="form-select form-select-lg" formControlName="type">
              <option value="client">client</option>
              <option value="fournisseur">fournisseur</option>
            </select>
          </div>
        </div>

        <!-- Ligne 2 : Ordre -->
        <div class="row g-3 mb-3">
          <div class="col-md-4">
            <label class="form-label fw-semibold">Ordre</label>
            <input class="form-control form-control-lg"
                   type="number"
                   placeholder="0"
                   formControlName="ordre" />
          </div>

        </div>

        <!-- Contenu -->
        <div class="mb-3">
          <label class="form-label fw-semibold">Contenu (HTML ou texte)</label>
          <textarea class="form-control"
                    rows="10"
                    placeholder="Saisissez le contenu ici…"
                    formControlName="contenu"></textarea>
        </div>

        <!-- Actions -->
        <div class="d-flex justify-content-between align-items-center pt-3 border-top">
          <a routerLink="/articles" class="btn btn-outline-secondary">
            ↩️ Annuler
          </a>
          <button type="submit" class="btn btn-outline-success px-4" [disabled]="saving">
            💾 Sauvegarder
          </button>
        </div>
      </form>
    </div>

    <!-- Footer global -->
    <app-footer></app-footer>
  </div>
</main>
