<!-- Fond supérieur comme la page CRA -->
<div class="min-height-300 bg-dark position-absolute w-100"></div>

<!-- Sidebar (identique à la page CRA) -->
<aside
  class="max-w-62.5 ease-nav-brand z-990 fixed inset-y-0 my-4 ml-4 block w-full -translate-x-full flex-wrap items-center justify-between overflow-y-auto rounded-2xl border-0 bg-white p-0 antialiased shadow-none transition-transform duration-200 xl:left-0 xl:translate-x-0 xl:bg-transparent">
  <app-side-bar></app-side-bar>
</aside>

<!-- Contenu principal -->
<main class="ease-soft-in-out xl:ml-68.5 relative h-full max-h-screen rounded-xl transition-all duration-200">
  <!-- Navbar -->
  <app-nav-layout></app-nav-layout>

  <div class="container-fluid py-4">
    <div class="row">
      <div class="col-12">
      <div class="hero-rectangle mb-4" style="height:35px; overflow:hidden;">
        <img
          src="assets/img/curved-images/curved0.jpg"
          alt="Illustration"
          style="width:100%; height:100% !important; object-fit:cover; display:block;"
        />
      </div>
<div class="d-flex justify-content-between align-items-center mb-4">
              <h3 class="mb-4 fw-bold border-bottom pb-2"
          style="background:linear-gradient(90deg,#344767);
                 -webkit-background-clip:text;background-clip:text;color:transparent;">👤 Filtrer les Profils par Offre </h3>
</div>

        <div class="card shadow-sm mt-4">
          <div class="card-header d-flex align-items-center justify-content-between">
            <h5 class="mb-0">Offre / mots-clés</h5>
          </div>

          <div class="card-body">
            <!-- Saisie de l’offre -->
            <label class="form-label fw-semibold"></label>
            <textarea
              [(ngModel)]="offerText"
              rows="4"
              class="form-control mb-2"
              placeholder="Collez ici l'annonce (stack, missions, mots-clés)…"></textarea>

            <button
              class="btn btn-primary mb-3"
              (click)="filtrer()"
              [disabled]="loading || !offerText?.trim() ">
              Filtrer
            </button>

            <!-- États -->
            <div *ngIf="loading" class="alert alert-info">Analyse en cours…</div>
            <div *ngIf="error" class="alert alert-danger">{{ error }}</div>

            <!-- Résultats -->
            <div class="table-responsive" *ngIf="!loading && results.length">
              <table class="table table-striped align-middle mb-0">
                <thead class="table-light">
                  <tr>
                    <th>Profil</th>
                    <th style="width: 260px;">Score</th>
                    <th>Compétences détectées</th>
                    <!-- <th class="text-center" style="width:1%">Info</th> -->
                    <th class="text-center" style="width:150px">Actions</th>  <!-- + -->
                  </tr>
                </thead>

                <tbody>
                  <tr *ngFor="let r of results">
                    <td>{{ r.displayName }}</td>

                    <td>
                      <div class="progress" style="height:18px;">
                        <div class="progress-bar"
                            [ngClass]="scoreClass(r.score)"
                            [style.width.%]="scorePct(r.score)">
                          {{ scorePct(r.score) }}%
                        </div>
                      </div>
                    </td>

                    <td>
                      <span *ngFor="let s of r.matchedSkills" class="badge bg-secondary me-1 mb-1">
                        {{ s }}
                      </span>
                    </td>

                    <!-- <td class="text-center">
                      <button type="button" class="btn btn-sm btn-outline-info" [attr.title]="r.reason">i</button>
                    </td> -->

                    <!-- Bouton Générer CV -->
                    <td class="text-center">
                      <button
                        type="button"
                        class="btn -pill px-4 shadow-sm"
                        style="background-color:#198754; color:#fff;"
                        (click)="genererCv(r.profileId)">
                        Générer CV
                      </button>
                    </td>
                  </tr>
                </tbody>
              </table>
            </div>


            <!-- Message vide seulement après clic -->
            <div *ngIf="!loading && hasQueried && results.length === 0" class="text-muted">
              Aucun profil correspondant.
            </div>
          </div>
        </div>

      </div>
    </div>

    <app-footer></app-footer>
  </div>
</main>
